<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match the Review — Practice Game</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2D2A26">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --honey: #FFC629;
    --ink: #2D2A26;
    --cream: #FFF8E7;
    --coral: #FF6B5C;
    --muted: #8A8175;
    --green: #3FB37F;
    --red: #E0473E;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(160deg, #FFC629 0%, #FFE08A 38%, #FFF8E7 100%);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 28px 16px 60px;
  }

  .wrap {
    width: 100%;
    max-width: 480px;
  }

  /* ---------- Loader screen ---------- */
  #loader-screen {
    padding: 24px 20px;
    text-align: center;
  }

  #loader-screen h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 24px;
    color: var(--ink);
    margin: 0 0 6px;
  }

  #loader-screen p.sub {
    font-size: 14px;
    color: var(--ink);
    opacity: 0.75;
    margin: 0 0 24px;
    line-height: 1.5;
  }

  .picker-section {
    margin-bottom: 22px;
  }

  .picker-section-label {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 12.5px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 10px;
    text-align: left;
  }

  .type-grid, .level-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .type-btn, .level-btn {
    background: rgba(255,255,255,0.6);
    border: 2px solid rgba(45,42,38,0.12);
    border-radius: 14px;
    padding: 14px 10px;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 13.5px;
    color: var(--ink);
    cursor: pointer;
    text-align: center;
    transition: border-color 0.2s ease, background 0.2s ease;
  }

  .type-btn:hover, .level-btn:hover {
    border-color: var(--coral);
  }

  .type-btn.active, .level-btn.active {
    background: var(--ink);
    color: var(--cream);
    border-color: var(--ink);
  }

  #loader-status {
    margin-top: 16px;
    font-size: 13px;
    color: var(--coral);
    font-weight: 600;
    min-height: 18px;
  }

  /* ---------- Game screen ---------- */
  #game-screen {
    display: none;
  }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px 16px;
  }

  .game-header h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--ink);
    margin: 0;
  }

  .game-progress {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    opacity: 0.65;
  }

  .photos-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 22px;
  }

  .photo-slot {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 18px;
    overflow: hidden;
    background: #ECE3CC;
    border: 3px solid rgba(255,255,255,0.6);
    box-shadow: 0 10px 24px -10px rgba(45,42,38,0.3);
    transition: border-color 0.2s ease, transform 0.15s ease;
  }

  .photo-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  .photo-slot .photo-title {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: linear-gradient(to top, rgba(45,42,38,0.85), rgba(45,42,38,0));
    color: white;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 18px 10px 8px;
    line-height: 1.25;
  }

  .photo-slot.drag-target-hover {
    border-color: var(--coral);
    transform: scale(1.03);
  }

  .photo-slot.filled {
    border-color: var(--muted);
  }

  .photo-slot .dropped-card-preview {
    position: absolute;
    inset: 0;
    background: rgba(255,248,231,0.96);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    text-align: center;
  }

  .dropped-card-preview .mini-label {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11.5px;
    line-height: 1.4;
    color: var(--ink);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
  }

  /* result overlays, shown only after checking */
  .photo-slot.result-correct {
    border-color: var(--green);
  }
  .photo-slot.result-wrong {
    border-color: var(--red);
  }

  .result-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 14px;
    font-weight: 800;
    z-index: 4;
  }

  .photo-slot.result-correct .result-badge {
    display: flex;
    background: var(--green);
  }
  .photo-slot.result-wrong .result-badge {
    display: flex;
    background: var(--red);
  }

  .reviews-pool {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 22px;
  }

  .review-chip {
    background: var(--cream);
    border: 1px solid rgba(45,42,38,0.1);
    border-radius: 14px;
    padding: 12px 14px;
    box-shadow: 0 6px 14px -6px rgba(45,42,38,0.18);
    cursor: grab;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .review-chip.dragging {
    opacity: 0.4;
  }

  .review-chip.placed {
    display: none;
  }

  .review-chip .chip-name {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--coral);
    margin-bottom: 4px;
  }

  .review-chip .chip-text {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink);
  }

  /* Floating clone while dragging */
  .drag-ghost {
    position: fixed;
    z-index: 80;
    pointer-events: none;
    opacity: 0.92;
    transform: scale(1.03) rotate(-2deg);
    box-shadow: 0 18px 30px -10px rgba(45,42,38,0.4);
  }

  .actions-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 8px;
  }

  .primary-btn {
    background: var(--ink);
    color: var(--cream);
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 14.5px;
    border: none;
    border-radius: 999px;
    padding: 13px 26px;
    cursor: pointer;
  }

  .primary-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .ghost-btn {
    background: transparent;
    color: var(--ink);
    border: 2px solid rgba(45,42,38,0.2);
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 14.5px;
    border-radius: 999px;
    padding: 11px 24px;
    cursor: pointer;
  }

  .result-summary {
    text-align: center;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    margin: 4px 0 14px;
    min-height: 20px;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============== Screen 1: file picker ============== -->
  <div id="loader-screen">
    <h1>Match the Review</h1>
    <p class="sub">Choose what to practice and a level. 4 review pages will be loaded automatically — drag each review onto the photo you think it's describing.</p>

    <div class="picker-section">
      <p class="picker-section-label">活動を選ぶ / Choose an activity</p>
      <div class="type-grid" id="type-grid"></div>
    </div>

    <div class="picker-section" id="level-section" style="display:none;">
      <p class="picker-section-label">レベルを選ぶ / Choose a level</p>
      <div class="level-grid" id="level-grid"></div>
    </div>

    <div id="loader-status"></div>
  </div>

  <!-- ============== Screen 2: matching game ============== -->
  <div id="game-screen">
    <div class="game-header">
      <h1>🧩 Match the review</h1>
      <div class="game-progress" id="game-progress">0 / 4 placed</div>
    </div>

    <div class="photos-row" id="photos-row"></div>

    <div class="reviews-pool" id="reviews-pool"></div>

    <p class="result-summary" id="result-summary"></p>

    <div class="actions-row">
      <button class="ghost-btn" id="btn-reset-round">Reset</button>
      <button class="primary-btn" id="btn-check" disabled>Check answers</button>
    </div>
    <div class="actions-row hidden" id="actions-row-restart">
      <button class="primary-btn" id="btn-load-new">Load another set</button>
    </div>
  </div>

</div>

<script>
(function () {
  "use strict";

  // ---------------------------------------------------------------
  // State
  // ---------------------------------------------------------------

  // Each item: { itemName, photoSrc, reviewName, jpText, sourceFile }
  let products = [];

  // slotAssignment[productIndex] = reviewIndex currently dropped there, or null
  let slotAssignment = [];
  let checked = false;

  const loaderScreen = document.getElementById("loader-screen");
  const gameScreen = document.getElementById("game-screen");
  const loaderStatus = document.getElementById("loader-status");
  const typeGrid = document.getElementById("type-grid");
  const levelSection = document.getElementById("level-section");
  const levelGrid = document.getElementById("level-grid");
  const photosRow = document.getElementById("photos-row");
  const reviewsPool = document.getElementById("reviews-pool");
  const gameProgress = document.getElementById("game-progress");
  const resultSummary = document.getElementById("result-summary");
  const btnCheck = document.getElementById("btn-check");
  const btnResetRound = document.getElementById("btn-reset-round");
  const actionsRowRestart = document.getElementById("actions-row-restart");
  const btnLoadNew = document.getElementById("btn-load-new");

  // ---------------------------------------------------------------
  // Step 1: type + level picking, then manifest-based loading
  // ---------------------------------------------------------------

  const TYPES = [
    { key: "restaurant-reviews", label: "🍜 Restaurant reviews" },
    { key: "amazon-reviews", label: "🛒 Amazon reviews" },
  ];

  // Level keys must exactly match the folder names under each type above
  const LEVELS = [
    { key: "Starter", label: "Starter" },
    { key: "Elementary_1", label: "Elementary 1" },
    { key: "Elementary_2", label: "Elementary 2" },
    { key: "Pre-intermediate", label: "Pre-intermediate" },
    { key: "Intermediate_1", label: "Intermediate 1" },
  ];

  let selectedType = null;

  typeGrid.innerHTML = TYPES.map((t) =>
    `<button class="type-btn" data-type="${escapeAttr(t.key)}">${escapeHtml(t.label)}</button>`
  ).join("");

  levelGrid.innerHTML = LEVELS.map((lvl) =>
    `<button class="level-btn" data-level="${escapeAttr(lvl.key)}">${escapeHtml(lvl.label)}</button>`
  ).join("");

  Array.from(typeGrid.querySelectorAll(".type-btn")).forEach((btn) => {
    btn.addEventListener("click", () => {
      selectedType = btn.dataset.type;
      Array.from(typeGrid.querySelectorAll(".type-btn")).forEach((b) =>
        b.classList.toggle("active", b === btn)
      );
      levelSection.style.display = "block";
      loaderStatus.textContent = "";
    });
  });

  Array.from(levelGrid.querySelectorAll(".level-btn")).forEach((btn) => {
    btn.addEventListener("click", () => {
      Array.from(levelGrid.querySelectorAll(".level-btn")).forEach((b) =>
        b.classList.toggle("active", b === btn)
      );
      if (selectedType) loadLevel(selectedType, btn.dataset.level);
    });
  });

  function loadLevel(typeFolder, levelKey) {
    loaderStatus.textContent = "Loading...";

    const manifestUrl = `${typeFolder}/${levelKey}/manifest.json`;

    fetch(manifestUrl)
      .then((res) => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then((entries) => {
        if (!Array.isArray(entries) || entries.length === 0) {
          loaderStatus.textContent = "No pages yet for this level.";
          return;
        }

        if (entries.length < 4) {
          loaderStatus.textContent =
            `This game needs at least 4 pages for this level — only ${entries.length} available so far.`;
          return;
        }

        // If there are more than 4, randomly pick 4 for this round
        // rather than always using the same first four.
        const chosen = shuffleEntries(entries).slice(0, 4);

        loaderStatus.textContent = "Loading 4 pages...";

        const fetches = chosen.map((entry) =>
          fetch(`${typeFolder}/${levelKey}/${encodeURIComponent(entry.file)}`).then((r) => {
            if (!r.ok) throw new Error(`HTTP ${r.status} for ${entry.file}`);
            return r.text();
          })
        );

        return Promise.all(fetches).then((contents) => {
          const parsed = [];
          const failed = [];

          contents.forEach((html, i) => {
            const product = parseReviewPageHtml(html, chosen[i].file);
            if (product) {
              parsed.push(product);
            } else {
              failed.push(chosen[i].file);
            }
          });

          if (parsed.length !== 4) {
            loaderStatus.textContent = failed.length
              ? `Couldn't read: ${failed.join(", ")}. Make sure manifest.json points at real review pages.`
              : "Couldn't read those pages as review pages.";
            return;
          }

          products = parsed;
          startGame();
        });
      })
      .catch((err) => {
        console.error(err);
        loaderStatus.textContent = "Couldn't load this level (missing manifest.json or a listed file).";
      });
  }

  // Distinct name from the in-game `shuffle` (used later for the review
  // pool order) so the two responsibilities stay easy to tell apart.
  function shuffleEntries(array) {
    const a = array.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /**
   * Parse a render_amazon_review_html() or render_restaurant_review_html()
   * output file: the photo, the title, and — among its 4 reviews — the
   * one with the longest Japanese text (most likely to contain
   * identifying detail).
   */
  function parseReviewPageHtml(htmlText, fileName) {
    try {
      const doc = new DOMParser().parseFromString(htmlText, "text/html");

      // Two possible page shapes: Amazon-style (.product-title /
      // .product-image img) or restaurant-style (.restaurant-name /
      // .photo-frame img). Try Amazon's class names first, then fall
      // back to the restaurant ones, rather than assuming one shape.
      const titleEl = doc.querySelector(".product-title") || doc.querySelector(".restaurant-name");
      if (!titleEl) return null; // doesn't look like either kind of review page

      // Restaurant pages can have a click-to-flip second photo
      // (.photo-2) — always take the FIRST photo (.product-image img
      // for Amazon, .photo-1 for restaurants, falling back to the
      // first <img> inside .photo-frame for older single-photo pages).
      const photoEl =
        doc.querySelector(".product-image img") ||
        doc.querySelector(".photo-frame img.photo-1") ||
        doc.querySelector(".photo-frame img");
      const photoSrc = photoEl ? photoEl.getAttribute("src") : "";

      const reviewCards = Array.from(doc.querySelectorAll(".review-card"));
      if (reviewCards.length === 0) return null;

      let longest = null;
      reviewCards.forEach((cardEl) => {
        const jpEl = cardEl.querySelector(".review-body-text.jp");
        const nameEl = cardEl.querySelector(".reviewer-name");
        const jpText = jpEl ? jpEl.textContent.trim() : "";
        if (!jpText) return;
        if (!longest || jpText.length > longest.jpText.length) {
          longest = {
            jpText: jpText,
            reviewName: nameEl ? nameEl.textContent.trim() : "Anonymous",
          };
        }
      });

      if (!longest) return null;

      return {
        sourceFile: fileName,
        itemName: titleEl.textContent.trim() || "Mystery Product",
        photoSrc: photoSrc || "",
        reviewName: longest.reviewName,
        jpText: longest.jpText,
      };
    } catch (err) {
      console.error("Failed to parse", fileName, err);
      return null;
    }
  }

  // ---------------------------------------------------------------
  // Step 2: game setup
  // ---------------------------------------------------------------

  function shuffle(array) {
    const a = array.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Maps a shuffled review-pool position -> the index into `products`
  // that review actually belongs to. Built once per round.
  let poolOrder = [];

  function startGame() {
    loaderScreen.style.display = "none";
    gameScreen.style.display = "block";
    resetRound();
  }

  function resetRound() {
    checked = false;
    slotAssignment = new Array(products.length).fill(null);
    poolOrder = shuffle(products.map((_, i) => i));

    resultSummary.textContent = "";
    actionsRowRestart.classList.add("hidden");
    btnCheck.disabled = true;
    btnCheck.textContent = "Check answers";

    renderPhotos();
    renderReviewPool();
    updateProgress();
  }

  function renderPhotos() {
    photosRow.innerHTML = products.map((product, i) => `
      <div class="photo-slot" data-slot-index="${i}">
        <img src="${escapeAttr(product.photoSrc)}" alt="${escapeAttr(product.itemName)}"
             onerror="this.src='https://placehold.co/600x600/EAEDED/232F3E?text=No+Image'">
        <div class="photo-title">${escapeHtml(product.itemName)}</div>
        <div class="result-badge"></div>
      </div>
    `).join("");

    Array.from(photosRow.querySelectorAll(".photo-slot")).forEach(attachDropTarget);
  }

  function renderReviewPool() {
    reviewsPool.innerHTML = poolOrder.map((productIndex) => `
      <div class="review-chip" data-review-index="${productIndex}">
        <div class="chip-name">${escapeHtml(products[productIndex].reviewName)}</div>
        <div class="chip-text">${escapeHtml(products[productIndex].jpText)}</div>
      </div>
    `).join("");

    Array.from(reviewsPool.querySelectorAll(".review-chip")).forEach(attachDraggable);
  }

  function updateProgress() {
    const placed = slotAssignment.filter((v) => v !== null).length;
    gameProgress.textContent = `${placed} / ${products.length} placed`;
    btnCheck.disabled = placed !== products.length || checked;
  }

  // ---------------------------------------------------------------
  // Step 3: drag and drop (pointer events, works for mouse + touch)
  // ---------------------------------------------------------------

  let dragGhost = null;
  let currentDragReviewIndex = null;
  let currentDropTargetEl = null;

  function attachDraggable(chipEl) {
    chipEl.addEventListener("pointerdown", onChipPointerDown);
  }

  function onChipPointerDown(e) {
    if (checked) return; // no rearranging after results are revealed
    const chipEl = e.currentTarget;
    const reviewIndex = Number(chipEl.dataset.reviewIndex);
    currentDragReviewIndex = reviewIndex;

    chipEl.classList.add("dragging");

    dragGhost = chipEl.cloneNode(true);
    dragGhost.classList.add("drag-ghost");
    dragGhost.style.width = chipEl.offsetWidth + "px";
    document.body.appendChild(dragGhost);
    positionGhost(e.clientX, e.clientY);

    chipEl.setPointerCapture(e.pointerId);
    window.addEventListener("pointermove", onChipPointerMove);
    window.addEventListener("pointerup", onChipPointerUp);

    function onChipPointerMove(ev) {
      positionGhost(ev.clientX, ev.clientY);
      updateHoveredDropTarget(ev.clientX, ev.clientY);
    }

    function onChipPointerUp(ev) {
      window.removeEventListener("pointermove", onChipPointerMove);
      window.removeEventListener("pointerup", onChipPointerUp);
      chipEl.classList.remove("dragging");

      const dropEl = currentDropTargetEl;
      clearHoverState();

      if (dragGhost) {
        dragGhost.remove();
        dragGhost = null;
      }

      if (dropEl) {
        placeReviewOnSlot(reviewIndex, Number(dropEl.dataset.slotIndex));
      }

      currentDragReviewIndex = null;
    }
  }

  function positionGhost(x, y) {
    if (!dragGhost) return;
    dragGhost.style.left = (x - dragGhost.offsetWidth / 2) + "px";
    dragGhost.style.top = (y - 24) + "px";
  }

  function updateHoveredDropTarget(x, y) {
    // Temporarily hide the ghost so elementFromPoint sees what's underneath it.
    if (dragGhost) dragGhost.style.display = "none";
    const elAtPoint = document.elementFromPoint(x, y);
    if (dragGhost) dragGhost.style.display = "";

    const slotEl = elAtPoint ? elAtPoint.closest(".photo-slot") : null;

    if (slotEl !== currentDropTargetEl) {
      clearHoverState();
      currentDropTargetEl = slotEl;
      if (currentDropTargetEl) {
        currentDropTargetEl.classList.add("drag-target-hover");
      }
    }
  }

  function clearHoverState() {
    if (currentDropTargetEl) {
      currentDropTargetEl.classList.remove("drag-target-hover");
    }
    currentDropTargetEl = null;
  }

  function attachDropTarget(slotEl) {
    // Drop targets themselves don't need their own listeners beyond
    // what elementFromPoint-based hit-testing in updateHoveredDropTarget
    // already provides — this function exists as the explicit hook
    // point in case touch/visual affordances are added later.
  }

  function placeReviewOnSlot(reviewIndex, slotIndex) {
    // If this review was already placed somewhere else, clear that slot first.
    const previousSlot = slotAssignment.indexOf(reviewIndex);
    if (previousSlot !== -1) {
      slotAssignment[previousSlot] = null;
    }

    // If the target slot already held a different review, that review's
    // index simply falls out of slotAssignment here. We don't need to
    // explicitly "return" it to the pool — refreshPlacedVisibility()
    // (called below) recomputes which reviews are placed from
    // slotAssignment alone, so a review no longer present there
    // automatically shows up in the pool again on the next render.
    slotAssignment[slotIndex] = reviewIndex;

    renderSlotContents();
    renderReviewPool();
    refreshPlacedVisibility();
    updateProgress();
  }

  function renderSlotContents() {
    Array.from(photosRow.querySelectorAll(".photo-slot")).forEach((slotEl) => {
      const slotIndex = Number(slotEl.dataset.slotIndex);
      const existingPreview = slotEl.querySelector(".dropped-card-preview");
      if (existingPreview) existingPreview.remove();

      const reviewIndex = slotAssignment[slotIndex];
      if (reviewIndex === null) {
        slotEl.classList.remove("filled");
        return;
      }
      slotEl.classList.add("filled");

      const preview = document.createElement("div");
      preview.className = "dropped-card-preview";
      preview.innerHTML = `<div class="mini-label">${escapeHtml(products[reviewIndex].jpText)}</div>`;
      slotEl.appendChild(preview);
    });
  }

  function refreshPlacedVisibility() {
    const placedReviewIndexes = new Set(slotAssignment.filter((v) => v !== null));
    Array.from(reviewsPool.querySelectorAll(".review-chip")).forEach((chipEl) => {
      const reviewIndex = Number(chipEl.dataset.reviewIndex);
      chipEl.classList.toggle("placed", placedReviewIndexes.has(reviewIndex));
    });
  }

  // ---------------------------------------------------------------
  // Step 4: checking results
  // ---------------------------------------------------------------

  btnCheck.addEventListener("click", () => {
    checked = true;
    let correctCount = 0;

    Array.from(photosRow.querySelectorAll(".photo-slot")).forEach((slotEl) => {
      const slotIndex = Number(slotEl.dataset.slotIndex);
      const reviewIndex = slotAssignment[slotIndex];
      const isCorrect = reviewIndex === slotIndex; // products[i]'s own review has reviewIndex === i

      slotEl.classList.remove("result-correct", "result-wrong");
      slotEl.classList.add(isCorrect ? "result-correct" : "result-wrong");

      const badge = slotEl.querySelector(".result-badge");
      if (badge) badge.textContent = isCorrect ? "✓" : "✕";

      if (isCorrect) correctCount += 1;
    });

    resultSummary.textContent =
      correctCount === products.length
        ? `🎉 All ${products.length} correct!`
        : `${correctCount} / ${products.length} correct — give it another look.`;

    btnCheck.disabled = true;
    actionsRowRestart.classList.remove("hidden");
  });

  btnResetRound.addEventListener("click", () => {
    resetRound();
    // also clear any result styling from a previous check
    Array.from(photosRow.querySelectorAll(".photo-slot")).forEach((slotEl) => {
      slotEl.classList.remove("result-correct", "result-wrong");
    });
  });

  btnLoadNew.addEventListener("click", () => {
    products = [];
    slotAssignment = [];
    checked = false;
    selectedType = null;
    Array.from(typeGrid.querySelectorAll(".type-btn")).forEach((b) => b.classList.remove("active"));
    Array.from(levelGrid.querySelectorAll(".level-btn")).forEach((b) => b.classList.remove("active"));
    levelSection.style.display = "none";
    loaderStatus.textContent = "";
    gameScreen.style.display = "none";
    loaderScreen.style.display = "block";
  });

  // ---------------------------------------------------------------
  // Small helpers
  // ---------------------------------------------------------------

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str == null ? "" : String(str);
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return escapeHtml(str).replace(/"/g, "&quot;");
  }
})();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch((err) => {
      console.warn("Service worker registration failed:", err);
    });
  });
}
</script>
